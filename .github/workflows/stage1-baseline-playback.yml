# ============================================================
# STAGE 1: Baseline Playback via GitHub Actions
# ============================================================
# Pulls two specific mock APIs from WireMock Cloud by their
# explicit IDs, starts them in local playback mode, then runs
# the test suite entirely against those mocks — no live APIs.
#
# Key concepts demonstrated:
#   - Installing and authenticating the WireMock CLI in CI
#   - Pulling mock APIs by hardcoded cloud ID
#   - Running wiremock locally as a background process
#   - Pointing the test suite at WireMock playback ports
# ============================================================

name: "Stage 1 – Baseline Playback"

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-with-mocks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install app dependencies
        run: npm ci

      # ── WireMock CLI setup ─────────────────────────────────

      - name: Install WireMock CLI
        run: npm install --global @wiremock/cli

      - name: Authenticate with WireMock Cloud
        # The API token is stored as a GitHub Actions secret.
        # Retrieve yours from: https://app.wiremock.cloud/account/security
        run: wiremock config set api_token "${{ secrets.WIREMOCK_API_TOKEN }}"

      # ── Pull mock APIs by explicit ID ──────────────────────
      #
      # We pull each mock API into the service slot already defined
      # in .wiremock/wiremock.yaml, which guarantees the playback
      # ports (8080, 8081) are consistent and known to the tests.
      #
      - name: Pull mock APIs from WireMock Cloud
        run: |
          wiremock pull mock-api mkg1g --into ip-api
          wiremock pull mock-api 49o3r --into weather-api

      # ── Start local playback ───────────────────────────────

      - name: Start WireMock local playback
        run: |
          wiremock run &
          # Wait until both mock API ports are accepting connections
          timeout 30 bash -c 'until nc -z localhost 8080 && nc -z localhost 8081; do sleep 1; done'
          echo "✓ Mock servers ready on :8080 (ip-api) and :8081 (weather-api)"

      # ── Verify traffic is routed to localhost, not WireMock Cloud ────
      #
      # Confirms two things before the tests run:
      #   1. The env vars point at localhost (not any cloud URL)
      #   2. The local mock servers are actually serving responses
      # If either curl fails with a non-200, this step fails and the
      # test step never runs — making misconfiguration immediately visible.

      - name: Verify mocks are running locally
        env:
          IP_API_BASE_URL: http://localhost:8080
          WEATHER_API_BASE_URL: http://localhost:8081
        run: |
          echo "IP_API_BASE_URL      = $IP_API_BASE_URL"
          echo "WEATHER_API_BASE_URL = $WEATHER_API_BASE_URL"
          echo ""
          echo "--- Probing :8080 (ip-api) ---"
          curl --fail --silent --show-error "$IP_API_BASE_URL/json/" | python3 -c "import sys,json; d=json.load(sys.stdin); print('✓ city:', d['city'])"
          echo "--- Probing :8081 (weather-api) ---"
          curl --fail --silent --show-error "$WEATHER_API_BASE_URL/v1/current.json?key=probe&q=51.5074,-0.1278&aqi=no" | python3 -c "import sys,json; d=json.load(sys.stdin); print('✓ location:', d['location']['name'])"

      # ── Run the test suite against mocks ──────────────────

      - name: Run tests against WireMock playback
        env:
          # Redirect both API clients to WireMock local playback ports
          IP_API_BASE_URL: http://localhost:8080
          WEATHER_API_BASE_URL: http://localhost:8081
          # Stubs don't match on the API key — any value satisfies the guard in api.ts
          WEATHER_API_KEY: mock-key
        run: npm test
