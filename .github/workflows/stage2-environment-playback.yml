# ============================================================
# STAGE 2: Environment-Based Mock Pull
# ============================================================
# Replaces the hardcoded mock API names from Stage 1 with a
# WireMock environment profile. The workflow no longer needs
# to know individual mock API IDs — it just names the profile
# and the action resolves which cloud IDs to pull from.
#
# Changes from Stage 1:
#   - Pull command switches from per-service names to --all --profile
#   - WIREMOCK_PROFILE is a GitHub Actions variable (not secret)
#     so it can be changed per-environment without editing YAML
#
# Key concepts demonstrated:
#   - WireMock Cloud environments (profile = named set of mock APIs)
#   - Decoupling mock API identity from the CI workflow definition
#   - How the profile overlay (.wiremock/wiremock-ci.yaml) works
# ============================================================

name: "Stage 2 – Environment-Based Playback"

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-with-mocks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install app dependencies
        run: npm ci

      # ── Pull mock APIs via environment profile ─────────────
      #
      # Instead of passing service names, we name the environment profile.
      # The action reads .wiremock/wiremock-ci.yaml (the profile overlay)
      # and uses its cloud_id values to determine which mock APIs to pull.
      # Port assignments and paths still come from .wiremock/wiremock.yaml.
      #
      # To add a new environment (e.g. "staging"), you only need to:
      #   1. Run: wiremock environments create --profile staging
      #   2. Commit the generated .wiremock/wiremock-staging.yaml
      #   3. Change WIREMOCK_PROFILE to "staging" in GitHub repo variables

      - name: Pull mock APIs from WireMock Cloud (via environment profile)
        uses: ethangj/gha-test@main
        with:
          api-token: ${{ secrets.WIREMOCK_API_TOKEN }}
          command: pull
          all: "true"
          profile: ${{ vars.WIREMOCK_PROFILE }}

      # ── Start local playback, verify, and run tests ─────────
      #
      # The action starts a WireMock Runner container in serve mode,
      # waits until both mock API ports are healthy, then executes
      # the run: command. After the command exits the container is
      # stopped automatically.

      - name: Verify mocks are running locally and run tests
        uses: ethangj/gha-test@main
        with:
          api-token: ${{ secrets.WIREMOCK_API_TOKEN }}
          mode: serve
          ports: "8080,8081"
          run: |
            echo "IP_API_BASE_URL      = $IP_API_BASE_URL"
            echo "WEATHER_API_BASE_URL = $WEATHER_API_BASE_URL"
            echo ""
            echo "--- Probing :8080 (ip-api) ---"
            curl --fail --silent --show-error "$IP_API_BASE_URL/json/" | python3 -c "import sys,json; d=json.load(sys.stdin); print('✓ city:', d['city'])"
            echo "--- Probing :8081 (weather-api) ---"
            curl --fail --silent --show-error "$WEATHER_API_BASE_URL/v1/current.json?key=probe&q=51.5074,-0.1278&aqi=no" | python3 -c "import sys,json; d=json.load(sys.stdin); print('✓ location:', d['location']['name'])"
            echo ""
            echo "→ Running tests against WireMock playback..."
            npm test
        env:
          IP_API_BASE_URL: http://localhost:8080
          WEATHER_API_BASE_URL: http://localhost:8081
          WEATHER_API_KEY: mock-key
