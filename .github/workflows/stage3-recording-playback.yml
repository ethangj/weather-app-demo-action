# ============================================================
# STAGE 3: Live Re-Recording + Environment Playback
# ============================================================
# Before running the test suite against mocks, this workflow
# first re-records the mock APIs against the live third-party
# endpoints. This ensures stubs are never stale — each CI run
# refreshes the recorded data then immediately validates against it.
#
# Changes from Stage 2:
#   - New "Record" phase added before the pull/run/test sequence
#   - The action starts a record-many container on the same ports
#     as playback; tests run through the recording proxies
#   - After recording, stubs are flushed to WireMock Cloud and
#     pulled fresh before the playback phase begins
#   - WEATHER_API_KEY (real key) is needed only in the recording phase
#
# Key concepts demonstrated:
#   - Non-interactive record-many via the WireMock Runner action
#   - Using the same test suite to generate recording traffic and validate stubs
#   - Environment profiles spanning both recording and playback
#   - The "always fresh" mocks pattern
# ============================================================

name: "Stage 3 – Re-Record + Environment Playback"

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  record-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install app dependencies
        run: npm ci

      # ── PHASE 1: Record fresh stubs from live APIs ─────────
      #
      # The action starts a WireMock Runner container in record-many mode,
      # which proxies :8080 → ip-api.com and :8081 → api.weatherapi.com.
      # After the run: command exits, the container shuts down gracefully,
      # flushing all captured traffic to the WireMock Cloud CI environment.
      #
      # record-many reads .wiremock/wiremock.yaml to find:
      #   - Which ports to proxy on (8080, 8081)
      #   - Which live URLs to proxy to (originals.default)
      #
      # The profile flag tells it to save recorded stubs to the
      # CI environment's cloud mock API IDs (from wiremock-ci.yaml)
      # rather than the base production IDs.

      - name: Record live API traffic through proxies
        uses: ethangj/gha-test@main
        with:
          api-token: ${{ secrets.WIREMOCK_API_TOKEN }}
          mode: record-many
          ports: "8080,8081"
          profile: ${{ vars.WIREMOCK_PROFILE }}
          run: |
            echo "IP_API_BASE_URL      = $IP_API_BASE_URL  (→ proxies to ip-api.com)"
            echo "WEATHER_API_BASE_URL = $WEATHER_API_BASE_URL  (→ proxies to api.weatherapi.com)"
            echo ""
            echo "--- Probing recording proxy :8080 (ip-api, no auth required) ---"
            curl --fail --silent --show-error "$IP_API_BASE_URL/json/" | python3 -c "import sys,json; d=json.load(sys.stdin); print('✓ city:', d['city'])"
            echo "--- Confirming recording proxy :8081 port is open ---"
            nc -z localhost 8081 && echo "✓ :8081 is listening (weather API proxy)"
            echo ""
            echo "→ Running tests against live APIs through recording proxies..."
            npm test
        env:
          # Same ports as playback — the proxies forward to real APIs and record simultaneously
          IP_API_BASE_URL: http://localhost:8080
          WEATHER_API_BASE_URL: http://localhost:8081
          # Real API key required here so WeatherAPI requests actually succeed
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}

      # ── Stop recording container ────────────────────────────
      #
      # The action's container lifecycle runs cleanup in a post hook,
      # meaning the record-many container is still holding ports 8080/8081
      # when the next step runs. Stop it explicitly so the playback
      # container can bind to the same ports.

      - name: Stop recording container and flush stubs to WireMock Cloud
        run: |
          docker stop $(docker ps -q --filter "name=wiremock-runner") 2>/dev/null || true
          echo "✓ Recording container stopped and stubs flushed to WireMock Cloud"

      # ── Pull freshly recorded stubs ─────────────────────────
      #
      # Pull the stubs that were just flushed to WireMock Cloud.

      - name: Pull freshly recorded stubs from WireMock Cloud
        uses: ethangj/gha-test@main
        with:
          api-token: ${{ secrets.WIREMOCK_API_TOKEN }}
          command: pull
          all: "true"
          profile: ${{ vars.WIREMOCK_PROFILE }}

      # ── PHASE 2: Pull fresh stubs and run in playback mode ──
      #
      # The action starts a WireMock Runner container in serve mode,
      # waits until both mock API ports are healthy, then verifies
      # responses and runs the full test suite against the fresh stubs.

      - name: Verify playback mocks are running locally and run tests
        uses: ethangj/gha-test@main
        with:
          api-token: ${{ secrets.WIREMOCK_API_TOKEN }}
          mode: serve
          ports: "8080,8081"
          run: |
            echo "IP_API_BASE_URL      = $IP_API_BASE_URL"
            echo "WEATHER_API_BASE_URL = $WEATHER_API_BASE_URL"
            echo ""
            echo "--- Probing :8080 (ip-api) ---"
            curl --fail --silent --show-error "$IP_API_BASE_URL/json/" | python3 -c "import sys,json; d=json.load(sys.stdin); print('✓ city:', d['city'])"
            echo "--- Probing :8081 (weather-api) ---"
            curl --fail --silent --show-error "$WEATHER_API_BASE_URL/v1/current.json?key=probe&q=51.5074,-0.1278&aqi=no" | python3 -c "import sys,json; d=json.load(sys.stdin); print('✓ location:', d['location']['name'])"
            echo ""
            echo "→ Running tests against freshly recorded WireMock stubs..."
            npm test
        env:
          IP_API_BASE_URL: http://localhost:8080
          WEATHER_API_BASE_URL: http://localhost:8081
          # Stubs don't match on the key — any value works in playback
          WEATHER_API_KEY: mock-key
